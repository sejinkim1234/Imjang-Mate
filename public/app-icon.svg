<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-gradient)" />

  <!-- House Base -->
  <g filter="url(#drop-shadow)" transform="translate(106, 120)">
    <!-- Roof -->
    <path d="M150 20 L280 140 L260 160 L150 60 L40 160 L20 140 Z" fill="#FFFFFF" />
    
    <!-- Building -->
    <path d="M50 150 L50 350 C50 361 59 370 70 370 L230 370 C241 370 250 361 250 350 L250 150 Z" fill="#FFFFFF" />
    
    <!-- Map Pin / Location inside the house -->
    <path d="M150 180 C125 180 105 200 105 225 C105 258 150 310 150 310 C150 310 195 258 195 225 C195 200 175 180 150 180 Z" fill="#2563EB" />
    <circle cx="150" cy="225" r="16" fill="#FFFFFF" />
  </g>
</svg>
