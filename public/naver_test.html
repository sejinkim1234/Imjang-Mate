<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 지도 테스트</title>
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=7fz83eygi7"></script>
    <style>
        #map { width: 100%; height: 400px; }
    </style>
</head>
<body>
    <h2>네이버 지도 인증 테스트</h2>
    <div id="map"></div>
    <script>
        var map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(37.5665, 126.9780),
            zoom: 13
        });
    </script>
</body>
</html>
